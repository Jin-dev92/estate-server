global:
  scrape_interval: 15s
scrape_configs:
  - job_name: estate-server
    static_configs:
      - targets: ['host.docker.internal:3000']
  # postgres-exporter는 compose 네트워크 안에 있어 서비스명으로 직접 접근한다
  # (앱은 호스트에서 돌아 host.docker.internal, exporter는 컨테이너라 서비스명).
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
